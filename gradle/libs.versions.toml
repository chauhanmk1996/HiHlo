retrofitRxAdapter = "3.0.0"
rxandroid = "2.1.1"
rxjava = "2.2.21"
rxbinding = "2.2.0"
okhttp = "5.3.2"
lifecycle = "2.10.0"
firebase-bom = "34.11.0"
firebase-crashlytics = "2.9.9"
navigation-safeargs-kotlin = "2.9.6"
glide = "5.0.7"
coil = "2.7.0"
swiperefreshlayout = "1.2.0"
fragment-ktx = "1.8.9"
permission = "1.8.1"
navigationFragmentKtx = "2.9.0"
navigationUiKtx = "2.9.0"
